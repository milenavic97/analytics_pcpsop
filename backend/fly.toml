# fly.toml app configuration file for dfl-sop-api

app = 'dfl-sop-api'
primary_region = 'gru'

[build]

[env]
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    soft_limit = 30
    hard_limit = 50

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1