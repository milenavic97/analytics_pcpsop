# fly.toml app configuration file generated for dfl-sop-api on 2026-05-05T06:00:21-03:00

app = 'dfl-sop-api'
primary_region = 'gru'

[build]

[env]
  ENVIRONMENT = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2

  [http_service.concurrency]
    type = 'connections'
    soft_limit = 30
    hard_limit = 50

[[vm]]
  memory = '4096mb'
  cpu_kind = 'performance'
  cpus = 2